<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codyssey E1-1</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffaf2;
      --ink: #1f2937;
      --accent: #b45309;
      --line: #d6c4a8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(180, 83, 9, 0.18), transparent 28%),
        linear-gradient(135deg, #f9f3e8 0%, #efe3cf 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    .badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(180, 83, 9, 0.12);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    ul {
      margin: 20px 0 0;
      padding-left: 18px;
      line-height: 1.7;
    }

    strong {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">Week 1 Workstation</div>
    <h1>Codyssey E1-1</h1>
    <p>이 페이지는 <strong>NGINX 기반 커스텀 Docker 이미지</strong>로 제공되는 정적 웹 서버입니다.</p>
    <p>포트 매핑, 바인드 마운트, 볼륨 영속성 검증을 위한 제출용 예제로 사용합니다.</p>
    <p id="bind-marker">Bind mount status: second live update verified</p>
    <ul>
      <li>Base image: <code>nginx:alpine</code></li>
      <li>Container port: <code>80</code></li>
      <li>Host ports used in docs: <code>8080</code>, <code>8081</code>, <code>8082</code></li>
    </ul>
  </main>
</body>
</html>
